<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Bisnisaja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #ed0677;
      --primary-hover: #c9055f;
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text-1: #17171f;
      --text-2: #1f2129;
      --text-3: #737885;
      --text-4: #99a1ab;
      --border: #ccd1d9;
      --divider: #e0e0e5;
      --shadow-card: 0px 4px 24px 0px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    /* ── Form Card ── */
    .signup-card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow-card);
      width: 480px;
      max-width: 100%;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
      overflow: hidden;
    }

    /* ── Header ── */
    .signup-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .signup-logo {
      background-color: var(--primary);
      border-radius: 32px;
      width: 64px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .signup-logo span {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
    }

    .signup-text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .signup-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.2;
    }

    .signup-subtitle {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-3);
      line-height: 1.4;
    }

    /* ── Fields ── */
    .signup-fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .signup-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .signup-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      line-height: 1;
    }

    .signup-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      height: 48px;
      width: 100%;
      padding: 0 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-2);
      outline: none;
      transition: border-color 0.15s ease;
    }

    .signup-input::placeholder {
      color: var(--text-4);
    }

    .signup-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(237, 6, 119, 0.12);
    }

    /* ── CTA Button ── */
    .signup-btn {
      background-color: var(--primary);
      border: none;
      border-radius: 100px;
      height: 52px;
      width: 100%;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      transition: background-color 0.15s ease, transform 0.1s ease;
      flex-shrink: 0;
    }

    .signup-btn:not(:disabled):hover {
      background-color: var(--primary-hover);
    }

    .signup-btn:not(:disabled):active {
      transform: scale(0.98);
    }

    .signup-btn:disabled {
      background-color: #f0a8ce;
      cursor: not-allowed;
    }

    /* ── Divider ── */
    .signup-divider {
      width: 100%;
      height: 1px;
      background-color: var(--divider);
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .signup-footer {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      width: 100%;
    }

    .signup-footer-text {
      font-weight: 400;
      color: var(--text-3);
    }

    .signup-footer-link {
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }

    .signup-footer-link:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="signup-card">

    <!-- Header -->
    <div class="signup-header">
      <div class="signup-logo">
        <span>A</span>
      </div>
      <div class="signup-text-group">
        <h1 class="signup-title">Create your account</h1>
        <p class="signup-subtitle">Join us today — it's completely free!</p>
      </div>
    </div>

    <!-- Fields -->
    <div class="signup-fields">
      <div class="signup-field">
        <label class="signup-label" for="fullName">Full Name</label>
        <input
          class="signup-input"
          id="fullName"
          type="text"
          placeholder="Enter your full name"
          autocomplete="name"
        />
      </div>
      <div class="signup-field">
        <label class="signup-label" for="email">Email Address</label>
        <input
          class="signup-input"
          id="email"
          type="email"
          placeholder="Enter your email address"
          autocomplete="email"
        />
      </div>
      <div class="signup-field">
        <label class="signup-label" for="password">Password</label>
        <input
          class="signup-input"
          id="password"
          type="password"
          placeholder="Create a password"
          autocomplete="new-password"
        />
      </div>
    </div>

    <!-- CTA -->
    <button class="signup-btn" type="button">Create Account</button>

    <!-- Divider -->
    <div class="signup-divider"></div>

    <!-- Footer -->
    <div class="signup-footer">
      <span class="signup-footer-text">Already have an account?</span>
      <a class="signup-footer-link" href="#">Sign in</a>
    </div>

  </div>
  <script>
    const btn = document.querySelector('.signup-btn');
    const inputs = document.querySelectorAll('.signup-input');

    function checkFields() {
      const allFilled = [...inputs].every(input => input.value.trim() !== '');
      btn.disabled = !allFilled;
    }

    inputs.forEach(input => input.addEventListener('input', checkFields));

    // Initialize as disabled
    checkFields();
  </script>
</body>
</html>
